# NGINX config for Illizeo Onboarding on Jelastic
# Place in /etc/nginx/conf.d/ or update the default server block

server {
    listen 80;
    listen 443 ssl;
    server_name onboarding.illizeo.com onboarding-illizeo.jcloud-ver-jpc.ik-server.com;

    root /var/www/webroot/ROOT/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 20M;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets (Vite build)
    location /build/ {
        alias /var/www/webroot/ROOT/public/build/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location /assets/ {
        alias /var/www/webroot/ROOT/public/build/assets/;
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Static files
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # Laravel API
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param HTTPS on;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
    }

    # Block hidden files
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Block storage access
    location ~ ^/storage/ {
        deny all;
    }
}
